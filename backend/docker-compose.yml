version: "3.9"

name: iskommerce

services:
  db:
    image: postgres:16
    container_name: postgres_iskommerce
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iskommerce
    volumes:
      - postgres_data_iskommerce:/var/lib/postgresql/data

volumes:
  postgres_data_iskommerce: